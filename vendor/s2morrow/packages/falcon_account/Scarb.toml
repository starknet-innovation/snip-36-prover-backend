[package]
name = "falcon_account"
version = "0.1.0"
edition = "2024_07"

[lib]

[dependencies]
starknet = ">=2.9.1"
falcon = { path = "../falcon" }
openzeppelin_account = { path = "../../../openzeppelin/account" }
openzeppelin_interfaces = { path = "../../../openzeppelin/interfaces" }
openzeppelin_introspection = { path = "../../../openzeppelin/introspection" }
openzeppelin_utils = { path = "../../../openzeppelin/utils" }

[dev-dependencies]
snforge_std = { git = "https://github.com/foundry-rs/starknet-foundry", tag = "v0.55.0" }
assert_macros = "2.17.0"

[[target.starknet-contract]]
allowed-libfuncs-list.name = "experimental"
sierra = true
casm = true

[target-defaults.test]
build-external-contracts = [
    "falcon_account::preset::FalconAccount",
]
