version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # starknet-rust-crypto 0.19 pins starknet-types-core =0.2.4, so any bump past
      # 0.2.x produces two incompatible Felt types at build time (12 compile errors).
      # Revisit once starknet-rust-crypto publishes a release that bumps its pin.
      - dependency-name: "starknet-types-core"
        versions: [">=0.3.0"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/web/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/web/coinflip"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      coinflip-minor-patch:
        update-types:
          - minor
          - patch
