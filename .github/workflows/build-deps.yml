name: Build & Release Pre-built Dependencies

# Builds stwo-run-and-prove, starknet_transaction_prover, and
# bootloader_program.json for macOS (arm64) and Linux (x86_64), then uploads
# them as GitHub Release assets.
#
# Trigger: push a release tag like `v0.1.0`, a deps tag like `deps-v1`, or run
# manually.

on:
  push:
    tags:
      - 'v*'
      - 'deps-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag name (e.g. v0.1.0 or deps-v1)'
        required: true
        default: 'deps-v1'

permissions:
  contents: read

env:
  SEQUENCER_TAG: PRIVACY-0.14.2-RC.6
  PROVING_UTILS_REV: c0b937bb19126255fbeeededbcaea4a84ae9f1c0
  STWO_NIGHTLY: nightly-2025-07-14

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchains
        uses: dtolnay/rust-toolchain@stable
      - run: rustup toolchain install ${{ env.STWO_NIGHTLY }}

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-deps-cargo-${{ env.STWO_NIGHTLY }}-${{ env.SEQUENCER_TAG }}

      - name: Cache build targets
        uses: actions/cache@v5
        with:
          path: |
            target
            deps/proving-utils/target
            deps/sequencer/target
          key: ${{ runner.os }}-deps-target-${{ matrix.target }}-${{ env.STWO_NIGHTLY }}-${{ env.SEQUENCER_TAG }}-${{ env.PROVING_UTILS_REV }}-${{ hashFiles('Cargo.lock', 'vendor/proving-utils.Cargo.lock', 'crates/snip36-cli/src/commands/setup.rs') }}
          restore-keys: |
            ${{ runner.os }}-deps-target-${{ matrix.target }}-${{ env.STWO_NIGHTLY }}-${{ env.SEQUENCER_TAG }}-${{ env.PROVING_UTILS_REV }}-
            ${{ runner.os }}-deps-target-${{ matrix.target }}-${{ env.STWO_NIGHTLY }}-

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build snip36 CLI
        run: cargo build --release -p snip36-cli

      - name: Run setup (builds prover + runner)
        run: ./target/release/snip36 setup

      - name: Package binaries
        run: |
          set -euo pipefail

          mkdir -p dist
          mkdir -p dist/shared_executables/bin
          cp deps/bin/stwo-run-and-prove dist/
          cp deps/bin/bootloader_program.json dist/

          # The current CLI expects starknet_transaction_prover. Keep the
          # starknet_os_runner alias for older scripts that still use that name.
          RUNNER_BIN=deps/sequencer/target/release/starknet_transaction_prover
          if [ ! -x "$RUNNER_BIN" ]; then
            echo "Missing expected runner binary: $RUNNER_BIN" >&2
            exit 1
          fi
          cp "$RUNNER_BIN" dist/starknet_transaction_prover
          cp "$RUNNER_BIN" dist/starknet_os_runner

          # starknet-sierra-compile is generated by the sequencer build.
          cp \
            deps/sequencer/target/release/shared_executables/starknet-sierra-compile \
            dist/shared_executables/bin/

          test -x dist/stwo-run-and-prove
          test -x dist/starknet_transaction_prover
          test -x dist/starknet_os_runner
          test -f dist/bootloader_program.json
          test -x dist/shared_executables/bin/starknet-sierra-compile

          find dist -maxdepth 3 -type f -print -exec ls -lh {} \;
          tar czf snip36-deps-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: snip36-deps-${{ matrix.target }}
          path: snip36-deps-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create dependency release
        if: ${{ startsWith(steps.tag.outputs.tag, 'deps-v') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Pre-built dependencies (${{ steps.tag.outputs.tag }})"
          body: |
            Pre-built binaries for SNIP-36 prover dependencies.

            **Contents:**
            - `stwo-run-and-prove` — Circle STARK prover
            - `starknet_transaction_prover` — Virtual OS executor used by `snip36`
            - `starknet_os_runner` — Compatibility alias for older scripts
            - `shared_executables/bin/starknet-sierra-compile` — Sierra compiler
            - `bootloader_program.json` — Bootloader program

            **Versions:**
            - sequencer: `${{ env.SEQUENCER_TAG }}`
            - proving-utils: `${{ env.PROVING_UTILS_REV }}`
            - Rust nightly: `${{ env.STWO_NIGHTLY }}`

            **Usage:**
            ```bash
            ./scripts/download-deps.sh ${{ steps.tag.outputs.tag }}
            ```
          files: |
            artifacts/snip36-deps-linux-x86_64/snip36-deps-linux-x86_64.tar.gz
            artifacts/snip36-deps-darwin-arm64/snip36-deps-darwin-arm64.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: false

      - name: Attach dependency assets to release
        if: ${{ !startsWith(steps.tag.outputs.tag, 'deps-v') }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          assets=(
            artifacts/snip36-deps-linux-x86_64/snip36-deps-linux-x86_64.tar.gz
            artifacts/snip36-deps-darwin-arm64/snip36-deps-darwin-arm64.tar.gz
          )

          for asset in "${assets[@]}"; do
            test -f "$asset"
          done

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" \
              --title "$TAG" \
              --generate-notes
          fi
