name: Build & Release

# Builds release assets for macOS (arm64) and Linux (x86_64, arm64), then
# publishes them as GitHub Release assets together with a SHA256SUMS file.
#
# Tags:
#   v<x.y.z>  — application release: publishes the snip36 binaries AND the
#               pinned prebuilt deps from the deps-version release. Must equal
#               the workspace version in Cargo.toml.
#   deps-v<n> — prebuilt dependency bundle only (what scripts/download-deps.sh
#               consumes). Cut a new one when the pins below change.
# Or run manually via workflow_dispatch with a `tag` input.

on:
  push:
    tags:
      - 'v*'
      - 'deps-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag name (e.g. v1.1.0 or deps-v1)'
        required: true
        default: 'deps-v1'

permissions:
  contents: read

env:
  SEQUENCER_TAG: 9f78ee7cef28fc83c9c637d81475db8079a05554
  PROVING_UTILS_REV: 3035dd00421daa541894297bd754db6e2787807b
  STWO_NIGHTLY: nightly-2026-01-15

jobs:
  # Fail fast when a v* tag doesn't match the workspace version, when
  # extractor/Cargo.toml drifted from it, or when an app release points at a
  # missing/mismatched deps-v* release.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      deps_tag: ${{ steps.deps-tag.outputs.deps_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check versions
        run: ./scripts/check-versions.sh "${{ steps.tag.outputs.tag }}"

      - name: Determine pinned deps release
        id: deps-tag
        run: |
          set -euo pipefail
          deps_tag="$(cat deps-version)"
          case "$deps_tag" in
            deps-v*) ;;
            *)
              echo "deps-version must contain a deps-v* tag, got: $deps_tag" >&2
              exit 1
              ;;
          esac
          echo "deps_tag=$deps_tag" >> "$GITHUB_OUTPUT"

      - name: Check pinned deps release
        if: ${{ !startsWith(steps.tag.outputs.tag, 'deps-v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          deps_tag="${{ steps.deps-tag.outputs.deps_tag }}"

          body="$(gh release view "$deps_tag" --repo "${{ github.repository }}" --json body --jq '.body // ""')"
          for expected in "$SEQUENCER_TAG" "$PROVING_UTILS_REV" "$STWO_NIGHTLY"; do
            if ! grep -Fq "$expected" <<<"$body"; then
              echo "Pinned deps release $deps_tag does not mention expected pin: $expected" >&2
              echo "Cut a new deps-v* release for the current pins, then update deps-version." >&2
              exit 1
            fi
          done

          assets="$(gh release view "$deps_tag" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"
          for asset in \
            snip36-deps-linux-x86_64.tar.gz \
            snip36-deps-linux-arm64.tar.gz \
            snip36-deps-darwin-arm64.tar.gz \
            SHA256SUMS; do
            if ! grep -Fxq "$asset" <<<"$assets"; then
              echo "Pinned deps release $deps_tag is missing asset: $asset" >&2
              exit 1
            fi
          done

  build:
    needs: preflight
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchains
        uses: dtolnay/rust-toolchain@stable
      - name: Install stwo nightly toolchain
        if: ${{ startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        run: rustup toolchain install ${{ env.STWO_NIGHTLY }}

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-deps-cargo-${{ env.STWO_NIGHTLY }}-${{ env.SEQUENCER_TAG }}

      - name: Cache build targets
        uses: actions/cache@v5
        with:
          path: |
            target
            deps/proving-utils/target
            deps/sequencer/target
          key: ${{ runner.os }}-deps-target-${{ matrix.target }}-${{ env.STWO_NIGHTLY }}-${{ env.SEQUENCER_TAG }}-${{ env.PROVING_UTILS_REV }}-${{ hashFiles('Cargo.lock', 'vendor/proving-utils.Cargo.lock', 'crates/snip36-cli/src/commands/setup.rs') }}
          restore-keys: |
            ${{ runner.os }}-deps-target-${{ matrix.target }}-${{ env.STWO_NIGHTLY }}-${{ env.SEQUENCER_TAG }}-${{ env.PROVING_UTILS_REV }}-
            ${{ runner.os }}-deps-target-${{ matrix.target }}-${{ env.STWO_NIGHTLY }}-

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build snip36 release binaries
        if: ${{ !startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        run: cargo build --release -p snip36-cli -p snip36-playground

      - name: Build snip36 setup binary
        if: ${{ startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        run: cargo build --release -p snip36-cli

      - name: Run setup (builds prover + runner)
        if: ${{ startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        run: ./target/release/snip36 setup

      - name: Package application binaries
        if: ${{ !startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        run: |
          set -euo pipefail
          mkdir -p app
          cp target/release/snip36 app/
          cp target/release/snip36-playground app/
          test -x app/snip36
          test -x app/snip36-playground
          tar czf snip36-${{ matrix.target }}.tar.gz -C app .

      - name: Package dependency binaries
        if: ${{ startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        run: |
          set -euo pipefail

          mkdir -p dist
          cp deps/bin/stwo-run-and-prove dist/
          cp deps/bin/bootloader_program.json dist/

          # The current CLI expects starknet_transaction_prover. Keep the
          # starknet_os_runner alias for older scripts that still use that name.
          RUNNER_BIN=deps/sequencer/target/release/starknet_transaction_prover
          if [ ! -x "$RUNNER_BIN" ]; then
            echo "Missing expected runner binary: $RUNNER_BIN" >&2
            exit 1
          fi
          cp "$RUNNER_BIN" dist/starknet_transaction_prover
          cp "$RUNNER_BIN" dist/starknet_os_runner

          # Sequencer v0.14.3 resolves starknet-sierra-compile from
          # CARGO_TOOLS_ROOT at runtime. Ship the project-local tools root so
          # release binaries are relocatable and do not depend on CI paths.
          cp -a deps/compiler-tools dist/
          SIERRA_BIN="$(find dist/compiler-tools -path '*/bin/starknet-sierra-compile' -type f | head -n 1)"

          test -x dist/stwo-run-and-prove
          test -x dist/starknet_transaction_prover
          test -x dist/starknet_os_runner
          test -f dist/bootloader_program.json
          test -n "$SIERRA_BIN"
          test -x "$SIERRA_BIN"

          find dist -maxdepth 4 -type f -print -exec ls -lh {} \;
          tar czf snip36-deps-${{ matrix.target }}.tar.gz -C dist .

      - name: Download pinned prebuilt deps
        if: ${{ !startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          deps_tag="${{ needs.preflight.outputs.deps_tag }}"
          asset="snip36-deps-${{ matrix.target }}.tar.gz"

          mkdir -p prebuilt-deps
          gh release download "$deps_tag" \
            --repo "${{ github.repository }}" \
            --pattern "$asset" \
            --pattern SHA256SUMS \
            --dir prebuilt-deps

          expected="$(awk -v f="$asset" '$2 == f {print $1}' prebuilt-deps/SHA256SUMS)"
          if [ -z "$expected" ]; then
            echo "$deps_tag SHA256SUMS has no entry for $asset" >&2
            exit 1
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            actual="$(sha256sum "prebuilt-deps/$asset" | awk '{print $1}')"
          else
            actual="$(shasum -a 256 "prebuilt-deps/$asset" | awk '{print $1}')"
          fi

          if [ "$actual" != "$expected" ]; then
            echo "Checksum mismatch for $asset from $deps_tag" >&2
            echo "  expected: $expected" >&2
            echo "  actual:   $actual" >&2
            exit 1
          fi

          cp "prebuilt-deps/$asset" "$asset"

      - name: Unpack pinned prebuilt deps
        if: ${{ !startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          tar xzf snip36-deps-${{ matrix.target }}.tar.gz -C dist

          test -x dist/stwo-run-and-prove
          test -x dist/starknet_transaction_prover
          test -x dist/starknet_os_runner
          test -f dist/bootloader_program.json
          test -n "$(find dist/compiler-tools -path '*/bin/starknet-sierra-compile' -type f -perm -111 | head -n 1)"

      - name: Install cairo-compile for prebuilt deps smoke test
        if: ${{ !startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        run: |
          set -euo pipefail
          python3.12 -m venv sequencer_venv
          curl -fsSL "https://raw.githubusercontent.com/starkware-libs/sequencer/${SEQUENCER_TAG}/scripts/requirements.txt" -o /tmp/seq-requirements.txt
          sequencer_venv/bin/pip install --quiet -r /tmp/seq-requirements.txt
          test -x sequencer_venv/bin/cairo-compile

      # Prove + verify a tiny fixture with the binaries we just packaged, on this
      # job's own architecture. Offline (no network/secrets); catches a prover
      # stack that builds but cannot actually prove — previously the only check
      # the darwin-arm64 artifacts ever got was `test -x` (#56).
      - name: Smoke test packaged deps (offline prove + verify)
        run: ./scripts/smoke-test-deps.sh dist

      - name: Upload application artifact
        if: ${{ !startsWith(needs.preflight.outputs.tag, 'deps-v') }}
        uses: actions/upload-artifact@v7
        with:
          name: snip36-${{ matrix.target }}
          path: snip36-${{ matrix.target }}.tar.gz

      - name: Upload dependency artifact
        uses: actions/upload-artifact@v7
        with:
          name: snip36-deps-${{ matrix.target }}
          path: snip36-deps-${{ matrix.target }}.tar.gz

  release:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Needed for scripts/install.sh, attached to v* releases below.
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Checksums for exactly the assets each release type attaches. Generated
      # here (not per-platform) so all tarballs land in a single SHA256SUMS.
      # Consumers verify with: grep <asset> SHA256SUMS | sha256sum -c
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p checksums
          tag="${{ needs.preflight.outputs.tag }}"
          deps=(snip36-deps-linux-x86_64 snip36-deps-linux-arm64 snip36-deps-darwin-arm64)
          apps=(snip36-linux-x86_64 snip36-linux-arm64 snip36-darwin-arm64)
          if [[ "$tag" == deps-v* ]]; then
            files=("${deps[@]}")
          else
            files=("${apps[@]}" "${deps[@]}")
          fi
          for f in "${files[@]}"; do
            cp "artifacts/$f/$f.tar.gz" checksums/
          done
          (cd checksums && sha256sum -- *.tar.gz > SHA256SUMS)
          cat checksums/SHA256SUMS

      # Both paths use softprops/action-gh-release (GitHub API, no git checkout
      # needed). A raw `gh release` CLI here fails with "not a git repository".
      - name: Release prebuilt dependencies (deps-v*)
        if: ${{ startsWith(steps.tag.outputs.tag, 'deps-v') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Pre-built dependencies (${{ steps.tag.outputs.tag }})"
          # Keep `releases/latest` resolving to a v* app release —
          # install.sh's one-liner URL depends on it.
          make_latest: "false"
          body: |
            Pre-built binaries for SNIP-36 prover dependencies.

            **Contents:**
            - `stwo-run-and-prove` — Circle STARK prover
            - `starknet_transaction_prover` — Virtual OS executor used by `snip36`
            - `starknet_os_runner` — Compatibility alias for older scripts
            - `compiler-tools/starknet-sierra-compile-*/bin/starknet-sierra-compile` — Sierra compiler
            - `bootloader_program.json` — Bootloader program

            **Versions:**
            - sequencer: `${{ env.SEQUENCER_TAG }}`
            - proving-utils: `${{ env.PROVING_UTILS_REV }}`
            - Rust nightly: `${{ env.STWO_NIGHTLY }}`

            **Usage:**
            ```bash
            ./scripts/download-deps.sh ${{ steps.tag.outputs.tag }}
            ```
          files: |
            artifacts/snip36-deps-linux-x86_64/snip36-deps-linux-x86_64.tar.gz
            artifacts/snip36-deps-linux-arm64/snip36-deps-linux-arm64.tar.gz
            artifacts/snip36-deps-darwin-arm64/snip36-deps-darwin-arm64.tar.gz
            checksums/SHA256SUMS
          fail_on_unmatched_files: true

      # softprops' make_latest has been observed to be ignored on release
      # creation (deps-v4 became "latest" despite make_latest: false above).
      # Deterministic guard: re-promote the newest v* release explicitly.
      - name: Keep latest pointing at a v* release
        if: ${{ startsWith(steps.tag.outputs.tag, 'deps-v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          latest_v="$(gh api "repos/${{ github.repository }}/releases" \
            --jq '[.[] | select((.tag_name | startswith("v")) and (.draft or .prerelease | not))][0].tag_name')"
          if [ -n "$latest_v" ]; then
            gh release edit "$latest_v" --repo "${{ github.repository }}" --latest
            echo "latest -> $latest_v"
          else
            echo "no v* release found; skipping"
          fi

      - name: Release application + dependencies (v*)
        if: ${{ !startsWith(steps.tag.outputs.tag, 'deps-v') }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "SNIP-36 Prover ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          body: |
            SNIP-36 virtual-block prover — ${{ steps.tag.outputs.tag }}.

            **Application binaries** (per platform, in `snip36-<platform>.tar.gz`):
            - `snip36` — unified CLI
            - `snip36-playground` — web playground server

            **Bundled prebuilt dependencies** (in `snip36-deps-<platform>.tar.gz`):
            - `stwo-run-and-prove`, `starknet_transaction_prover`
              (+ `starknet_os_runner` alias), `starknet-sierra-compile`,
              `bootloader_program.json`
            - sequencer `${{ env.SEQUENCER_TAG }}`, proving-utils
              `${{ env.PROVING_UTILS_REV }}`, nightly `${{ env.STWO_NIGHTLY }}`
            - reused from `${{ needs.preflight.outputs.deps_tag }}`

            Platforms: linux-x86_64, linux-arm64, darwin-arm64.
          files: |
            artifacts/snip36-linux-x86_64/snip36-linux-x86_64.tar.gz
            artifacts/snip36-linux-arm64/snip36-linux-arm64.tar.gz
            artifacts/snip36-darwin-arm64/snip36-darwin-arm64.tar.gz
            artifacts/snip36-deps-linux-x86_64/snip36-deps-linux-x86_64.tar.gz
            artifacts/snip36-deps-linux-arm64/snip36-deps-linux-arm64.tar.gz
            artifacts/snip36-deps-darwin-arm64/snip36-deps-darwin-arm64.tar.gz
            checksums/SHA256SUMS
            scripts/install.sh
          fail_on_unmatched_files: true

  # All-in-one Docker image, published to GHCR on app releases (v* tags only).
  # Assembled from the Linux artifacts — no rebuild. Each architecture builds
  # and smoke-tests NATIVELY on its own runner (no QEMU for the CPU-bound
  # prover), pushes the per-arch image by digest, and docker-manifest stitches
  # the digests into one multi-arch manifest. See Dockerfile.
  docker:
    if: ${{ startsWith(needs.preflight.outputs.tag, 'v') }}
    needs: [preflight, build]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            platform: linux/arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # The Dockerfile ADDs fixed generic names (ADD cannot interpolate a
      # per-arch source from a build arg), so stage this platform's tarballs
      # under those names.
      - name: Stage build context
        run: |
          set -euo pipefail
          cp artifacts/snip36-${{ matrix.target }}/snip36-${{ matrix.target }}.tar.gz snip36.tar.gz
          cp artifacts/snip36-deps-${{ matrix.target }}/snip36-deps-${{ matrix.target }}.tar.gz snip36-deps.tar.gz

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: snip36-smoke:${{ matrix.target }}

      - name: Smoke test (binaries load in-image, native arch)
        run: |
          set -euo pipefail
          IMG=snip36-smoke:${{ matrix.target }}
          docker run --rm "$IMG" --help >/dev/null
          docker run --rm --entrypoint /app/deps/sequencer/target/release/starknet_transaction_prover "$IMG" --help >/dev/null
          docker run --rm --entrypoint /bin/sh "$IMG" -c 'test -n "$(find /app/deps/compiler-tools -path "*/bin/starknet-sierra-compile" -type f -perm -111 | head -n 1)"'
          echo "smoke test passed"

      # Push untagged by digest; docker-manifest assembles + tags the manifest.
      # Reuses the buildx layer cache from the smoke-test build.
      - name: Push image by digest
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.target }}
          path: /tmp/digests/*
          if-no-files-found: error

  # Stitch the per-arch digests into one multi-arch manifest and tag it.
  docker-manifest:
    if: ${{ startsWith(needs.preflight.outputs.tag, 'v') }}
    needs: [preflight, docker]
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Image version
        id: meta
        run: |
          tag="${{ needs.preflight.outputs.tag }}"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          set -euo pipefail
          IMAGE=ghcr.io/${{ github.repository }}
          refs=()
          for f in /tmp/digests/*; do
            refs+=("$IMAGE@sha256:$(basename "$f")")
          done
          docker buildx imagetools create \
            -t "$IMAGE:${{ steps.meta.outputs.version }}" \
            -t "$IMAGE:latest" \
            "${refs[@]}"
          docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"
