name: Daily Integration Health Check

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch: {}   # Allow manual triggers

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build snip36 CLI
        run: cargo build --release -p snip36-cli

      - name: Install starknet-foundry (sncast)
        shell: bash
        run: |
          curl -L https://raw.githubusercontent.com/foundry-rs/starknet-foundry/master/scripts/install.sh | sh
          source "$HOME/.bashrc" 2>/dev/null || true
          export PATH="$HOME/.local/bin:$HOME/.starknet-foundry/bin:$PATH"
          snfoundryup
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.starknet-foundry/bin" >> "$GITHUB_PATH"

      - name: Install scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.2"

      - name: Verify tools
        run: |
          ./target/release/snip36 --help
          sncast --version
          scarb --version

      - name: Run health check
        env:
          STARKNET_RPC_URL: ${{ secrets.STARKNET_RPC_URL }}
          STARKNET_ACCOUNT_ADDRESS: ${{ secrets.STARKNET_ACCOUNT_ADDRESS }}
          STARKNET_PRIVATE_KEY: ${{ secrets.STARKNET_PRIVATE_KEY }}
        run: ./target/release/snip36 health
