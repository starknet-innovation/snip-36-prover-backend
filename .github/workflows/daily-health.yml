name: Daily Sepolia Health Check

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  pull_request:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to run the E2E tests against'
        type: choice
        required: true
        default: sepolia
        options:
          - sepolia
          - mainnet

# Serialize all runs so they don't race on the shared sepolia account's nonce.
# Runs from PRs, schedule, and workflow_dispatch all share one queue; nothing
# is cancelled so each run gets to complete.
concurrency:
  group: sepolia-e2e-account
  cancel-in-progress: false

# Version pins — bump these to force a rebuild of cached deps.
env:
  SEQUENCER_TAG: PRIVACY-0.14.2-RC.3
  PROVING_UTILS_REV: dbc39e74
  STWO_NIGHTLY: nightly-2025-07-14

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchains
        uses: dtolnay/rust-toolchain@stable
      - run: rustup toolchain install ${{ env.STWO_NIGHTLY }}

      - name: Cache cargo artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build snip36 CLI
        run: cargo build --release -p snip36-cli

      - name: Install starknet-foundry (sncast)
        shell: bash
        run: |
          curl -L https://raw.githubusercontent.com/foundry-rs/starknet-foundry/master/scripts/install.sh | sh
          source "$HOME/.bashrc" 2>/dev/null || true
          export PATH="$HOME/.local/bin:$HOME/.starknet-foundry/bin:$PATH"
          snfoundryup
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.starknet-foundry/bin" >> "$GITHUB_PATH"

      - name: Install scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.17.0-rc.4"

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify tools
        run: |
          ./snip36 --help
          sncast --version
          scarb --version
          python3 --version

      # Cache the heavy deps: sequencer clone + built binaries + proving-utils + venv.
      # Cache key includes the version pins so it rebuilds when they change.
      - name: Cache prebuilt deps
        id: deps-cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            sequencer_venv
          key: ${{ runner.os }}-deps-${{ env.SEQUENCER_TAG }}-${{ env.PROVING_UTILS_REV }}-${{ env.STWO_NIGHTLY }}
          save-always: true

      - name: Setup deps (clone, build prover + runner)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: ./snip36 setup

      - name: Run E2E counter test
        env:
          STARKNET_RPC_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_STARKNET_RPC_URL || secrets.STARKNET_RPC_URL }}
          STARKNET_ACCOUNT_ADDRESS: ${{ inputs.network == 'mainnet' && secrets.MAINNET_STARKNET_ACCOUNT_ADDRESS || secrets.STARKNET_ACCOUNT_ADDRESS }}
          STARKNET_PRIVATE_KEY: ${{ inputs.network == 'mainnet' && secrets.MAINNET_STARKNET_PRIVATE_KEY || secrets.STARKNET_PRIVATE_KEY }}
          STARKNET_GATEWAY_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_STARKNET_GATEWAY_URL || secrets.STARKNET_GATEWAY_URL }}
          STARKNET_CHAIN_ID: ${{ inputs.network == 'mainnet' && 'SN_MAIN' || 'SN_SEPOLIA' }}
        run: ./snip36 e2e

      - name: Run E2E messages test
        env:
          STARKNET_RPC_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_STARKNET_RPC_URL || secrets.STARKNET_RPC_URL }}
          STARKNET_ACCOUNT_ADDRESS: ${{ inputs.network == 'mainnet' && secrets.MAINNET_STARKNET_ACCOUNT_ADDRESS || secrets.STARKNET_ACCOUNT_ADDRESS }}
          STARKNET_PRIVATE_KEY: ${{ inputs.network == 'mainnet' && secrets.MAINNET_STARKNET_PRIVATE_KEY || secrets.STARKNET_PRIVATE_KEY }}
          STARKNET_GATEWAY_URL: ${{ inputs.network == 'mainnet' && secrets.MAINNET_STARKNET_GATEWAY_URL || secrets.STARKNET_GATEWAY_URL }}
          STARKNET_CHAIN_ID: ${{ inputs.network == 'mainnet' && 'SN_MAIN' || 'SN_SEPOLIA' }}
        run: ./snip36 e2e-messages
