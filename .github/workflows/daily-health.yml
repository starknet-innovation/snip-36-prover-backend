name: Daily Integration Health Check

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch: {}   # Allow manual triggers

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install starknet-foundry (sncast)
        shell: bash
        run: |
          curl -L https://raw.githubusercontent.com/foundry-rs/starknet-foundry/master/scripts/install.sh | sh
          source "$HOME/.bashrc" 2>/dev/null || true
          export PATH="$HOME/.local/bin:$HOME/.starknet-foundry/bin:$PATH"
          snfoundryup
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.starknet-foundry/bin" >> "$GITHUB_PATH"

      - name: Install scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.15.2"

      - name: Verify tools
        run: |
          sncast --version
          scarb --version
          python3 --version

      - name: Run health check
        env:
          STARKNET_RPC_URL: ${{ secrets.STARKNET_RPC_URL }}
          STARKNET_ACCOUNT_ADDRESS: ${{ secrets.STARKNET_ACCOUNT_ADDRESS }}
          STARKNET_PRIVATE_KEY: ${{ secrets.STARKNET_PRIVATE_KEY }}
        run: python3 tests/ci-health-check.py
